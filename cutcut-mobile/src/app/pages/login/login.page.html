<ion-header>
  <ion-toolbar>
    <ion-title>CutCut Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form (ngSubmit)="login()">
    <ion-item>
      <ion-label position="stacked">Email</ion-label>
      <ion-input
        type="email"
        name="email"
        [(ngModel)]="email"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        autocomplete="email"
        inputmode="email"
        required>
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Password</ion-label>
      <ion-input
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required>
      </ion-input>
    </ion-item>

    <ion-text color="danger" *ngIf="errorMessage">
      <p>{{ errorMessage }}</p>
    </ion-text>

    <ion-button expand="block" type="submit" [disabled]="loading">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <span *ngIf="!loading">Login</span>
    </ion-button>
  </form>
</ion-content>

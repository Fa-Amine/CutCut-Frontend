<section class="messages-page">
  <div class="messages-shell">

    <div class="page-header">
      <span class="page-kicker">MESSAGES</span>
      <h1>💬 Mes Messages</h1>
      <p>Conversations avec vos clients</p>
    </div>

    <div *ngIf="isLoading()" style="text-align:center; padding:3rem; color:#a3a3a3;">
      Chargement...
    </div>

    <div *ngIf="!isLoading() && partners().length === 0" class="empty-state">
      <span>💬</span>
      <h3>Aucun message</h3>
      <p>Vos clients pourront vous envoyer des messages depuis votre profil.</p>
    </div>

    <div class="conversations-list" *ngIf="!isLoading() && partners().length > 0">
      <a *ngFor="let partner of partners()"
        [routerLink]="['/chat', partner.id]"
        class="conversation-item">
        <div class="partner-avatar">{{ getInitials(partner.name) }}</div>
        <div class="partner-info">
          <h4>{{ partner.name }}</h4>
          <p>{{ partner.email }}</p>
        </div>
        <div class="chat-arrow">→</div>
      </a>
    </div>

  </div>
</section>

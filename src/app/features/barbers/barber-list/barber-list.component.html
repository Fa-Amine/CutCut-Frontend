<section class="barbers-page">
  <div class="barbers-shell">
    <div class="page-header">
      <div>
        <span class="page-kicker">{{ langService.t().availableBarbers }}</span>
        <h1>{{ langService.t().barbersTitle }}</h1>
        <p>{{ langService.t().barbersSubtitle }}</p>
      </div>
    </div>

    <div class="view-toggle">
      <button [class.active]="viewMode() === 'list'" (click)="setViewMode('list')">
        📋 Liste
      </button>
      <button [class.active]="viewMode() === 'map'" (click)="setViewMode('map')">
        🗺️ Carte
      </button>
    </div>

    <div class="filters-card">
      <div class="filters-grid">
        <div class="filter-group">
          <label>{{ langService.t().searchBarber }}</label>
          <input pInputText class="w-full"
            [ngModel]="searchTerm()"
            (ngModelChange)="setSearch($event)"
            [placeholder]="langService.t().searchPlaceholder" />
        </div>
        <div class="filter-group" style="justify-content:flex-end;">
          <button pButton type="button"
            [label]="isLocating() ? 'Localisation...' : sortByDistance() ? '📍 Trié par distance' : '📍 Près de moi'"
            [disabled]="isLocating()"
            [severity]="sortByDistance() ? 'success' : 'secondary'"
            (click)="locateMe()">
          </button>
        </div>
      </div>
    </div>

    <app-loading-spinner *ngIf="isLoading()" message="Chargement des barbiers..."></app-loading-spinner>
    <app-error-alert *ngIf="!isLoading() && errorMessage()" title="Erreur" [message]="errorMessage()"></app-error-alert>

    <!-- VUE CARTE -->
    <div *ngIf="!isLoading() && !errorMessage() && viewMode() === 'map'">
      <div id="barbers-map" style="width:100%; height:calc(100vh - 320px); min-height:550px; border-radius:24px; overflow:hidden; border:1px solid rgba(26,26,26,0.1);"></div>
      <p style="text-align:center; color:rgba(26,26,26,0.4); margin-top:1rem; font-size:0.9rem;">
        📍 Cliquez sur un marqueur pour voir le profil du barbier
      </p>
    </div>

    <!-- VUE LISTE -->
    <ng-container *ngIf="viewMode() === 'list'">
      <app-empty-state
        *ngIf="!isLoading() && !errorMessage() && !filteredBarbers().length"
        [title]="langService.t().noBarbersFound"
        message="Aucun barbier disponible pour le moment.">
      </app-empty-state>

      <div class="barbers-grid" *ngIf="!isLoading() && !errorMessage() && barbersWithDistance().length">
        <div class="barber-card" *ngFor="let barber of barbersWithDistance()">

          <!-- ❤️ Bouton Favori -->
          <button
            *ngIf="sessionService.isClient()"
            class="fav-btn"
            (click)="favoriteService.toggleFavorite(barber.id)"
            [title]="favoriteService.isFavorite(barber.id) ? 'Retirer des favoris' : 'Ajouter aux favoris'">
            {{ favoriteService.isFavorite(barber.id) ? '❤️' : '🤍' }}
          </button>

          <div class="barber-card-top">
            <div class="barber-ident">
              <ng-container *ngIf="barber.photoUrl; else initialsAvatar">
                <img [src]="barber.photoUrl" [alt]="barber.name" class="barber-photo" />
              </ng-container>
              <ng-template #initialsAvatar>
                <p-avatar [label]="getInitials(barber.name)" shape="circle" size="xlarge"></p-avatar>
              </ng-template>
              <div>
                <h3>{{ barber.name }}</h3>
                <p>{{ barber.shopName || 'CutCut' }}</p>
                <small *ngIf="barber.distance !== null" style="color:#16a34a; font-weight:600;">
                  📍 {{ barber.distance!.toFixed(1) }} km
                </small>
              </div>
            </div>
            <p-tag *ngIf="barber.price !== undefined && barber.price !== null"
              [value]="barber.price + ' MAD'" severity="info"></p-tag>
          </div>

          <div class="barber-meta" *ngIf="barber.bio">
            <span class="specialty-chip">{{ barber.bio }}</span>
          </div>

          <div class="barber-actions">
            <button pButton type="button" [label]="langService.t().bookAction"
              icon="pi pi-calendar-plus" [routerLink]="['/barbers', barber.id]"></button>
            <button pButton type="button" [label]="langService.t().viewProfile"
              severity="secondary" [outlined]="true" [routerLink]="['/barbers', barber.id]"></button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</section>

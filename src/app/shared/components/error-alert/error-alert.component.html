<div class="error-alert" role="alert">
  <div class="error-icon">!</div>
  <div class="error-content">
    <h3>{{ title }}</h3>
    <p>{{ message || 'Une erreur est survenue.' }}</p>
    <button *ngIf="showReload" class="retry-btn" (click)="reload()">
      🔄 Rafraichir la page
    </button>
  </div>
</div>
